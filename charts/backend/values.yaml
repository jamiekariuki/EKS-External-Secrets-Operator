namespace: dev
#backend
backend:
  name: backend
  replicas: 1
  labels:
    app: backend
    component: backend
  image:
    repository: 290488660393.dkr.ecr.us-east-1.amazonaws.com/eso-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  containerPort: 8080
  serviceAccountName: default
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "400m"
      memory: "512Mi"
  podAnnotations: {}
  envFrom:
    secretRef:
      name: db-credentials #must match with external secret store target 
  #service    
  service:
    name: backend
    type: ClusterIP
    port: 8080
#external secrete
externalSecret:
  secretStore:
    name: cluster-secret-store
  name: db-credentials
  target: db-credentials
  refreshInterval: 5m0s
  remoteRef:
    key: eso-dev/rds/credentials
